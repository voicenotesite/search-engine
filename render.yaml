services:
  - type: web
    name: search-engine
    runtime: python
    repo: https://github.com/voicenotesite/search-engine
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
