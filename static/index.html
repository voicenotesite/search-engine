<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkSearch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e2e2f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
    width: 100%;
  }
  header {
    text-align: center;
    padding: 60px 0 40px;
  }
  h1 {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a6e3a1, #89b4fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  .subtitle {
    color: #585b70;
    font-size: 0.9rem;
    margin-top: 8px;
  }
  .search-box {
    display: flex;
    gap: 8px;
    margin: 32px 0;
  }
  .search-box input {
    flex: 1;
    padding: 14px 20px;
    background: #1a1a2e;
    border: 1px solid #2a2a44;
    border-radius: 12px;
    color: #e2e2f0;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .search-box input:focus {
    border-color: #a6e3a1;
    box-shadow: 0 0 0 3px rgba(166, 227, 161, 0.1);
  }
  .search-box input::placeholder { color: #585b70; }
  .search-box button {
    padding: 14px 28px;
    background: #a6e3a1;
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .search-box button:hover { opacity: 0.85; }
  .search-box button:disabled { opacity: 0.4; cursor: not-allowed; }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 32px;
  }
  .tag {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .tag-clear { background: #1a1a2e; color: #89b4fa; border: 1px solid #2a2a44; }
  .tag-dark { background: #1a1a2e; color: #a6e3a1; border: 1px solid #2a2a44; }
  .tag-block { background: #1a1a2e; color: #f38ba8; border: 1px solid #2a2a44; }

  .stats {
    text-align: center;
    color: #585b70;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .results { list-style: none; }
  .result {
    padding: 16px 20px;
    margin-bottom: 12px;
    background: #12121e;
    border: 1px solid #1a1a2e;
    border-radius: 12px;
    transition: border 0.2s;
  }
  .result:hover { border-color: #2a2a44; }
  .result .source {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .source-google { background: #1e1e3a; color: #89b4fa; }
  .source-ahmia { background: #1e2a1e; color: #a6e3a1; }
  .result a {
    color: #89b4fa;
    text-decoration: none;
    font-size: 1.05rem;
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
  }
  .result a:hover { text-decoration: underline; }
  .result .url {
    color: #585b70;
    font-size: 0.8rem;
    margin-bottom: 4px;
    word-break: break-all;
  }
  .result .snippet {
    color: #a6adc8;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .blocked-msg {
    text-align: center;
    padding: 40px;
    color: #f38ba8;
  }
  .blocked-msg h2 { font-size: 1.2rem; margin-bottom: 8px; }
  .blocked-msg p { color: #585b70; font-size: 0.9rem; }

  .spinner {
    text-align: center;
    padding: 60px 0;
  }
  .spinner::after {
    content: '';
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid #2a2a44;
    border-top-color: #a6e3a1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    color: #585b70;
    padding: 60px 0;
  }

  footer {
    text-align: center;
    padding: 40px;
    color: #585b70;
    font-size: 0.8rem;
    margin-top: auto;
  }
  footer a { color: #585b70; }

  @media (max-width: 600px) {
    h1 { font-size: 2rem; }
    .search-box { flex-direction: column; }
    .container { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>DarkSearch</h1>
    <p class="subtitle">Clearnet (DuckDuckGo) + Darknet (Ahmia .onion) · z filtrem bezpieczeństwa</p>
  </header>

  <div class="search-box">
    <input id="query" type="text" placeholder="Szukaj w clearnecie i darknecie..." autofocus>
    <button id="searchBtn">Szukaj</button>
  </div>

  <div class="tags">
    <span class="tag tag-clear">&#x2601; DuckDuckGo</span>
    <span class="tag tag-dark">&#x1F4E1; Ahmia (darknet .onion)</span>
    <span class="tag tag-block">&#x26D4; Filtr NCII</span>
  </div>

  <div id="stats" class="stats"></div>
  <div id="results"></div>
</div>

<footer>
  DarkSearch &mdash; projekt portfolio &middot; <a href="https://github.com/voicenotesite/search-engine" target="_blank">GitHub</a>
</footer>

<script>
const input = document.getElementById('query');
const btn = document.getElementById('searchBtn');
const resultsDiv = document.getElementById('results');
const statsDiv = document.getElementById('stats');

input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
btn.addEventListener('click', search);

async function search() {
  const q = input.value.trim();
  if (!q) return;

  btn.disabled = true;
  resultsDiv.innerHTML = '<div class="spinner"></div>';
  statsDiv.textContent = '';

  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&num=10`);
    if (r.status === 403) {
      const err = await r.json();
      resultsDiv.innerHTML = `<div class="blocked-msg"><h2>⛔ Zablokowane</h2><p>${err.detail}</p></div>`;
      return;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    const data = await r.json();
    renderResults(data);
  } catch (e) {
    resultsDiv.innerHTML = `<div class="empty">Błąd: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResults(data) {
  if (!data.results || data.results.length === 0) {
    resultsDiv.innerHTML = '<div class="empty">Brak wyników</div>';
    statsDiv.textContent = '';
    return;
  }

  statsDiv.textContent = `Znaleziono ${data.total} wyników (DuckDuckGo: ${data.sources.duckduckgo || 0}, Ahmia: ${data.sources.ahmia || 0})`;

  let html = '<ul class="results">';
  for (const r of data.results) {
    const sourceClass = r.source === 'ahmia' ? 'source-ahmia' : 'source-google';
    const sourceLabel = r.source === 'ahmia' ? 'Ahmia (.onion)' : r.source === 'duckduckgo' ? 'DuckDuckGo' : r.source;
    html += `
      <li class="result">
        <span class="source ${sourceClass}">${sourceLabel}</span>
        <a href="${r.url}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>
        <div class="url">${escapeHtml(r.url)}</div>
        ${r.snippet ? `<div class="snippet">${escapeHtml(r.snippet)}</div>` : ''}
      </li>`;
  }
  html += '</ul>';
  resultsDiv.innerHTML = html;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
